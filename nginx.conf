server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 6;
  gzip_types text/css application/javascript image/svg+xml application/json;

  # O app é servido sem build/hash nos nomes: HTML, CSS e JS precisam ser
  # revalidados sempre, senão um deploy novo fica preso no cache do navegador.
  location ~* \.(html|css|js)$ {
    add_header Cache-Control "no-cache";
  }

  # Imagens e fontes mudam pouco.
  location ~* \.(svg|png|webp|jpg|jpeg|ico|woff2?)$ {
    add_header Cache-Control "public, max-age=2592000";
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
